services:
  - type: web
    name: webinar-framework
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput --clear || true
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:10000 --workers 2
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: webinar_db
          property: connectionString

databases:
  - name: webinar_db
    plan: free
